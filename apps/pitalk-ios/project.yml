name: PiTalkiOS
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_NAME: PiTalkiOS
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  PiTalkiOS:
    type: application
    platform: iOS
    sources:
      - path: PiTalkiOS
        excludes:
          - "**/*.md"
    info:
      path: PiTalkiOS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitalk.ios
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      gatherCoverageData: false
      testTargets: []
